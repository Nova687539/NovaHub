
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .panel { padding: 1rem 0; max-width: 680px; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .logo { width: 44px; height: 44px; border-radius: 50%; background: #1a1a2e; display: flex; align-items: center; justify-content: center; }
  .logo i { font-size: 22px; color: #fff; }
  .title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
  .subtitle { font-size: 13px; color: var(--color-text-secondary); }
  .status-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .badge { font-size: 12px; padding: 4px 10px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); }
  .badge.on { background: #e9f9ef; color: #1e7a3e; border-color: #a3d9b3; }
  .section { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .section-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
  .blinker-row { display: flex; gap: 10px; align-items: center; }
  .btn { flex: 1; padding: 14px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--color-text-primary); transition: all 0.15s; position: relative; }
  .btn:active { transform: scale(0.97); }
  .btn.active-left { background: #FFF0C2; border-color: #e8a800; color: #7a5500; }
  .btn.active-right { background: #FFF0C2; border-color: #e8a800; color: #7a5500; }
  .btn.active-warn { background: #FFEAE8; border-color: #d84343; color: #8a1f1f; }
  .btn.mode-active { background: #1a1a2e; border-color: #1a1a2e; color: #fff; }
  .blink-dot { width: 10px; height: 10px; border-radius: 50%; background: #e8a800; opacity: 0; transition: opacity 0.1s; }
  .blink-dot.blinking { animation: blink 0.6s infinite; }
  .warn-dot { width: 10px; height: 10px; border-radius: 50%; background: #d84343; opacity: 0; }
  .warn-dot.blinking { animation: blink 0.5s infinite; }
  @keyframes blink { 0%,100%{opacity:0} 50%{opacity:1} }
  .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .mode-btn { padding: 12px 6px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; color: var(--color-text-primary); transition: all 0.15s; }
  .mode-btn .mode-icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .mode-btn .mode-kmh { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .mode-btn:active { transform: scale(0.97); }
  .mode-btn.mode-active { background: #1a1a2e; border-color: #1a1a2e; color: #fff; }
  .mode-btn.mode-active .mode-kmh { color: #aaa; }
  .speed-display { text-align: center; margin: 0.5rem 0 1rem; }
  .speed-num { font-size: 48px; font-weight: 500; color: var(--color-text-primary); line-height: 1; }
  .speed-unit { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
  .speed-row { display: flex; align-items: center; gap: 12px; }
  .speed-label { font-size: 13px; color: var(--color-text-secondary); min-width: 70px; }
  .speed-val { font-size: 14px; font-weight: 500; min-width: 38px; text-align: right; color: var(--color-text-primary); }
  input[type=range] { flex: 1; }
  .battery-bar { height: 10px; border-radius: 99px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); overflow: hidden; margin-top: 6px; }
  .battery-fill { height: 100%; border-radius: 99px; background: #2ecc71; transition: width 0.3s; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; text-align: center; }
  .stat-val { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
  .stat-lbl { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 0.75rem 0; }
</style>

<div class="panel">
  <div class="header">
    <div class="logo"><i class="ti ti-motorbike" aria-hidden="true"></i></div>
    <div>
      <div class="title">Ninebot E2 Pro</div>
      <div class="subtitle">Control Panel</div>
    </div>
    <div style="margin-left:auto; display:flex; gap:6px; align-items:center;">
      <span class="badge on"><i class="ti ti-bluetooth" style="font-size:12px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>Verbunden</span>
      <span class="badge"><i class="ti ti-battery-3" style="font-size:12px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>78%</span>
    </div>
  </div>

  <div class="stat-grid" style="margin-bottom:1rem;">
    <div class="stat"><div class="stat-val" id="cur-speed">0</div><div class="stat-lbl">km/h aktuell</div></div>
    <div class="stat"><div class="stat-val">12.4</div><div class="stat-lbl">km Tour</div></div>
    <div class="stat"><div class="stat-val">34</div><div class="stat-lbl">km Rest</div></div>
  </div>

  <div class="section">
    <div class="section-title"><i class="ti ti-triangle" aria-hidden="true" style="font-size:13px;vertical-align:-1px;margin-right:5px;"></i>Fahrmodus</div>
    <div class="mode-grid">
      <button class="mode-btn" id="mode-eco" onclick="setMode('eco')">
        <span class="mode-icon">🌿</span>Eco<div class="mode-kmh">max 20 km/h</div>
      </button>
      <button class="mode-btn mode-active" id="mode-drive" onclick="setMode('drive')">
        <span class="mode-icon">🚗</span>Drive<div class="mode-kmh">max 25 km/h</div>
      </button>
      <button class="mode-btn" id="mode-sport" onclick="setMode('sport')">
        <span class="mode-icon">⚡</span>Sport<div class="mode-kmh">max 32 km/h</div>
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><i class="ti ti-gauge" aria-hidden="true" style="font-size:13px;vertical-align:-1px;margin-right:5px;"></i>Geschwindigkeitslimit</div>
    <div class="speed-display">
      <div class="speed-num" id="limit-num">25</div>
      <div class="speed-unit">km/h Limit</div>
    </div>
    <div class="speed-row">
      <span class="speed-label">15 km/h</span>
      <input type="range" min="15" max="32" value="25" step="1" id="speed-slider" oninput="updateSpeed(this.value)">
      <span class="speed-label" style="text-align:right;">32 km/h</span>
    </div>
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button class="btn" style="flex:none; padding: 10px 16px; font-size:13px;" onclick="setLimit(20)">20</button>
      <button class="btn" style="flex:none; padding: 10px 16px; font-size:13px;" onclick="setLimit(25)">25</button>
      <button class="btn" style="flex:none; padding: 10px 16px; font-size:13px;" onclick="setLimit(30)">30</button>
      <button class="btn" style="flex:none; padding: 10px 16px; font-size:13px;" onclick="setLimit(32)">32</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><i class="ti ti-arrow-left-right" aria-hidden="true" style="font-size:13px;vertical-align:-1px;margin-right:5px;"></i>Blinker &amp; Warnblinker</div>
    <div class="blinker-row">
      <button class="btn" id="btn-left" onclick="toggleBlinker('left')">
        <div class="blink-dot" id="dot-left"></div>
        <i class="ti ti-arrow-big-left-filled" aria-hidden="true" style="font-size:20px;"></i>
        Links
      </button>
      <button class="btn" id="btn-warn" onclick="toggleBlinker('warn')" style="flex:0.8;">
        <div class="warn-dot" id="dot-warn"></div>
        <i class="ti ti-alert-triangle" aria-hidden="true" style="font-size:20px;"></i>
      </button>
      <button class="btn" id="btn-right" onclick="toggleBlinker('right')">
        Rechts
        <i class="ti ti-arrow-big-right-filled" aria-hidden="true" style="font-size:20px;"></i>
        <div class="blink-dot" id="dot-right"></div>
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><i class="ti ti-battery" aria-hidden="true" style="font-size:13px;vertical-align:-1px;margin-right:5px;"></i>Akku</div>
    <div style="display:flex; justify-content:space-between; font-size:13px; color:var(--color-text-secondary);">
      <span>Ladestand</span><span style="color:var(--color-text-primary); font-weight:500;">78% — ca. 34 km</span>
    </div>
    <div class="battery-bar"><div class="battery-fill" style="width:78%;"></div></div>
  </div>
</div>

<script>
  let blinkerState = { left: false, right: false, warn: false };
  let blinkerInterval = null;
  let curSpeed = 0;
  let speedInterval = null;

  function clearBlinker() {
    clearInterval(blinkerInterval);
    blinkerInterval = null;
    ['left','right','warn'].forEach(s => {
      document.getElementById('dot-' + s).classList.remove('blinking');
    });
    document.getElementById('btn-left').classList.remove('active-left','active-warn');
    document.getElementById('btn-right').classList.remove('active-right','active-warn');
    document.getElementById('btn-warn').classList.remove('active-warn');
  }

  function toggleBlinker(side) {
    const wasOn = blinkerState[side];
    blinkerState = { left: false, right: false, warn: false };
    clearBlinker();
    if (!wasOn) {
      blinkerState[side] = true;
      if (side === 'warn') {
        document.getElementById('btn-warn').classList.add('active-warn');
        document.getElementById('btn-left').classList.add('active-warn');
        document.getElementById('btn-right').classList.add('active-warn');
        document.getElementById('dot-warn').classList.add('blinking');
        document.getElementById('dot-left').classList.add('blinking');
        document.getElementById('dot-right').classList.add('blinking');
      } else {
        document.getElementById('btn-' + side).classList.add('active-' + side);
        document.getElementById('dot-' + side).classList.add('blinking');
      }
    }
  }

  function updateSpeed(val) {
    document.getElementById('limit-num').textContent = val;
  }

  function setLimit(val) {
    document.getElementById('speed-slider').value = val;
    document.getElementById('limit-num').textContent = val;
  }

  function setMode(m) {
    ['eco','drive','sport'].forEach(x => {
      document.getElementById('mode-' + x).classList.remove('mode-active');
    });
    document.getElementById('mode-' + m).classList.add('mode-active');
    const limits = { eco: 20, drive: 25, sport: 32 };
    setLimit(limits[m]);
  }

  function animateSpeed() {
    let target = 0;
    speedInterval = setInterval(() => {
      const limit = parseInt(document.getElementById('limit-num').textContent);
      target = Math.max(0, Math.min(limit, target + (Math.random() * 4 - 1)));
      curSpeed = Math.round(target);
      document.getElementById('cur-speed').textContent = curSpeed;
    }, 600);
  }
  animateSpeed();
</script>
