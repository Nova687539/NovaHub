<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ninebot E2 Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0d0f;--surface:#18181c;--surface2:#222228;--border:#2e2e38;--text:#f0f0f2;--muted:#888;--amber:#f0a500;--amber-dim:#4a3300;--red:#e84040;--red-dim:#3a0808;--green:#2ecc71;--green-dim:#0a3020;--blue:#4da6ff;--blue-dim:#0a2040;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:0 0 3rem;}
.topbar{display:flex;align-items:center;gap:12px;padding:16px 16px 12px;border-bottom:1px solid var(--border);}
.logo{width:38px;height:38px;border-radius:50%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo svg{width:20px;height:20px;fill:#fff;}
.topbar-info{flex:1;}
.topbar-title{font-size:16px;font-weight:600;}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.badge{font-size:11px;padding:4px 10px;border-radius:99px;border:1px solid var(--border);color:var(--muted);background:var(--surface);}
.badge.connected{border-color:#1a5c30;color:var(--green);background:var(--green-dim);}
.badge.disconnected{border-color:#5c1a1a;color:var(--red);background:var(--red-dim);}
.section{margin:12px 12px 0;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;}
.section-label{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;font-weight:500;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 12px 0;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.stat-val{font-size:22px;font-weight:600;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;}
.connect-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .15s;}
.connect-btn.idle{background:#1a1a2e;color:var(--blue);border:1px solid var(--blue);}
.connect-btn.connecting{background:#0a2a0a;color:var(--green);border:1px solid var(--green);}
.connect-btn.disc{background:#2a0a0a;color:var(--red);border:1px solid var(--red);}
.connect-btn:active{transform:scale(0.98);}
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.mode-btn{padding:14px 4px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);font-size:13px;font-weight:500;cursor:pointer;text-align:center;color:var(--muted);transition:all .15s;}
.mode-btn .icon{font-size:22px;display:block;margin-bottom:5px;}
.mode-btn .kmh{font-size:11px;margin-top:3px;color:#555;}
.mode-btn:active{transform:scale(0.96);}
.mode-btn.active{background:#1a1a2e;border-color:var(--blue);color:var(--blue);}
.mode-btn.active .kmh{color:#3a6a9a;}
.speed-big{text-align:center;padding:8px 0 16px;}
.speed-num{font-size:64px;font-weight:700;line-height:1;}
.speed-unit{font-size:13px;color:var(--muted);margin-top:4px;}
.speed-row{display:flex;align-items:center;gap:10px;margin-top:8px;}
.speed-side{font-size:12px;color:var(--muted);min-width:32px;text-align:center;}
input[type=range]{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--border);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--blue);cursor:pointer;border:3px solid var(--bg);}
.quick-speeds{display:flex;gap:6px;margin-top:10px;}
.qbtn{flex:1;padding:10px 4px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;}
.qbtn:active{transform:scale(0.95);}
.qbtn.active{border-color:var(--amber);color:var(--amber);background:var(--amber-dim);}
.blinker-row{display:flex;gap:10px;}
.bln-btn{flex:1;padding:18px 8px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);transition:all .15s;}
.bln-btn:active{transform:scale(0.96);}
.bln-btn svg{width:22px;height:22px;fill:currentColor;flex-shrink:0;}
.bln-btn.wc{flex:0.6;flex-direction:column;gap:4px;font-size:12px;}
.bln-btn.al,.bln-btn.ar{border-color:var(--amber);color:var(--amber);background:var(--amber-dim);animation:bb .6s infinite;}
.bln-btn.aw{border-color:var(--red);color:var(--red);background:var(--red-dim);animation:bb .5s infinite;}
@keyframes bb{0%,100%{opacity:1}50%{opacity:.5}}
.log-box{background:var(--surface2);border-radius:10px;padding:10px;font-family:monospace;font-size:11px;max-height:180px;overflow-y:auto;margin-top:8px;border:1px solid var(--border);}
.ll{line-height:1.7;color:var(--muted);}
.ll.ok{color:#2ecc71;}.ll.err{color:#e84040;}.ll.info{color:#4da6ff;}.ll.rx{color:#c084fc;}.ll.warn{color:#f0a500;}
.batt-bar{height:8px;border-radius:4px;background:var(--border);overflow:hidden;margin-top:8px;}
.batt-fill{height:100%;border-radius:4px;background:var(--green);transition:width .5s;}
.proto-row{display:flex;gap:6px;margin-bottom:10px;}
.pbtn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);font-size:12px;color:var(--muted);cursor:pointer;}
.pbtn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M17 4H7c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14c-.83 0-1.5-.67-1.5-1.5S11.17 15 12 15s1.5.67 1.5 1.5S12.83 18 12 18zm3-7H9V7h6v4z"/></svg></div>
  <div class="topbar-info">
    <div class="topbar-title">Ninebot E2 Pro</div>
    <div class="topbar-sub" id="device-name">Nicht verbunden</div>
  </div>
  <span class="badge disconnected" id="conn-badge">Getrennt</span>
</div>

<div class="section" style="margin-top:12px;">
  <div class="section-label">Protokoll</div>
  <div class="proto-row">
    <button class="pbtn active" id="p0" onclick="setProto(0)">V1 (55AA)</button>
    <button class="pbtn" id="p1" onclick="setProto(1)">V2 (5AA5)</button>
    <button class="pbtn" id="p2" onclick="setProto(2)">Raw Scan</button>
  </div>
  <button class="connect-btn idle" id="conn-btn" onclick="toggleConnect()">Bluetooth verbinden</button>
  <div class="log-box" id="log-box"><div class="ll info">Bereit.</div></div>
</div>

<div class="stat-row">
  <div class="stat"><div class="stat-val" id="s-speed">—</div><div class="stat-lbl">km/h</div></div>
  <div class="stat"><div class="stat-val" id="s-batt">—</div><div class="stat-lbl">Akku %</div></div>
  <div class="stat"><div class="stat-val" id="s-limit">—</div><div class="stat-lbl">Limit km/h</div></div>
</div>

<div class="section">
  <div class="section-label">Fahrmodus</div>
  <div class="mode-grid">
    <button class="mode-btn" id="mode-eco" onclick="setMode('eco')"><span class="icon">🌿</span>Eco<div class="kmh">15 km/h</div></button>
    <button class="mode-btn active" id="mode-drive" onclick="setMode('drive')"><span class="icon">🚗</span>Drive<div class="kmh">25 km/h</div></button>
    <button class="mode-btn" id="mode-sport" onclick="setMode('sport')"><span class="icon">⚡</span>Sport<div class="kmh">32 km/h</div></button>
  </div>
</div>

<div class="section">
  <div class="section-label">Geschwindigkeitslimit</div>
  <div class="speed-big"><div class="speed-num" id="limit-display">25</div><div class="speed-unit">km/h Limit</div></div>
  <div class="speed-row">
    <span class="speed-side">15</span>
    <input type="range" min="15" max="32" step="1" value="25" id="speed-slider" oninput="onSlider(this.value)" onchange="sendSpeedLimit(this.value)">
    <span class="speed-side">32</span>
  </div>
  <div class="quick-speeds">
    <button class="qbtn" onclick="setLimit(15)">15</button>
    <button class="qbtn" onclick="setLimit(20)">20</button>
    <button class="qbtn active" onclick="setLimit(25)">25</button>
    <button class="qbtn" onclick="setLimit(30)">30</button>
    <button class="qbtn" onclick="setLimit(32)">32</button>
  </div>
</div>

<div class="section">
  <div class="section-label">Blinker &amp; Warnblinker</div>
  <div class="blinker-row">
    <button class="bln-btn" id="bln-left" onclick="toggleBlinker('left')"><svg viewBox="0 0 24 24"><path d="M20 12l-8-8v5H4v6h8v5z"/></svg>Links</button>
    <button class="bln-btn wc" id="bln-warn" onclick="toggleBlinker('warn')"><svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>Warn</button>
    <button class="bln-btn" id="bln-right" onclick="toggleBlinker('right')">Rechts<svg viewBox="0 0 24 24"><path d="M4 12l8 8V15h8V9H12V4z"/></svg></button>
  </div>
</div>

<div class="section">
  <div class="section-label">Akku</div>
  <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);">
    <span>Ladestand</span><span id="batt-text" style="color:var(--text);font-weight:500;">—</span>
  </div>
  <div class="batt-bar"><div class="batt-fill" id="batt-fill" style="width:0%"></div></div>
</div>

<script>
const SVC='6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX='6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const RX='6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let dev=null,txC=null,rxC=null,conn=false,proto=0;
let bst={left:false,right:false,warn:false};
let pollTimer=null;

function log(msg,type){
  const box=document.getElementById('log-box');
  const d=document.createElement('div');
  d.className='ll '+(type||'');
  const t=new Date().toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.textContent='['+t+'] '+msg;
  box.appendChild(d);box.scrollTop=box.scrollHeight;
  if(box.children.length>100)box.removeChild(box.children[0]);
}
function hx(a){return Array.from(a).map(b=>b.toString(16).padStart(2,'0')).join(' ');}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

function setProto(n){
  proto=n;
  [0,1,2].forEach(i=>document.getElementById('p'+i).classList.toggle('active',i===n));
  log('Protokoll: '+(n===0?'V1 55AA':n===1?'V2 5AA5':'Raw Scan'),'info');
}

// V1 packet: 55 AA len 0x20 cmd payload crc
function pktV1(cmd,payload){
  const p=payload||[];
  const buf=[0x55,0xAA,p.length+2,0x20,cmd,...p];
  let s=0; for(let i=2;i<buf.length;i++)s+=buf[i];
  const c=(s^0xFFFF)&0xFFFF;
  buf.push(c&0xFF,(c>>8)&0xFF);
  return new Uint8Array(buf);
}

// V2 packet: 5A A5 len src dst cmd arg payload crc
// src=0x3D (phone), dst=0x20 (ESC) or 0x22 (BLE)
function pktV2(dst,cmd,arg,payload){
  const p=payload||[];
  const buf=[0x5A,0xA5,p.length,0x3D,dst,cmd,arg,...p];
  let s=0; for(let i=2;i<buf.length;i++)s+=buf[i];
  const c=(s^0xFFFF)&0xFFFF;
  buf.push(c&0xFF,(c>>8)&0xFF);
  return new Uint8Array(buf);
}

async function write(pkt){
  if(!txC)return;
  const N=20;
  for(let i=0;i<pkt.length;i+=N){
    await txC.writeValueWithoutResponse(pkt.slice(i,i+N));
    await delay(25);
  }
}

async function send(cmd,payload){
  let pkt;
  if(proto===0) pkt=pktV1(cmd,payload);
  else pkt=pktV2(0x20,cmd,0x01,payload);
  log('TX: '+hx(pkt));
  await write(pkt);
}

// Also try V2 with BLE address
async function sendV2BLE(cmd,payload){
  const pkt=pktV2(0x22,cmd,0x01,payload||[]);
  log('TX(BLE): '+hx(pkt));
  await write(pkt);
}

function parseRx(ev){
  const b=new Uint8Array(ev.target.value.buffer);
  log('RX: '+hx(b),'rx');
  // try parse V1
  if(b[0]===0x55&&b[1]===0xAA&&b.length>=6){
    const cmd=b[4];
    if(cmd===0x62&&b.length>=16){
      const spd=Math.round((b[6]|(b[7]<<8))/1000*3.6);
      const bat=b[14]||0;
      document.getElementById('s-speed').textContent=spd;
      document.getElementById('s-batt').textContent=bat;
      document.getElementById('batt-text').textContent=bat+'%';
      document.getElementById('batt-fill').style.width=bat+'%';
    }
    if(cmd===0x64&&b.length>=10){
      const lim=Math.round((b[6]|(b[7]<<8))/1000*3.6);
      if(lim>0&&lim<=35){setLimitDisplay(lim);log('Limit: '+lim+' km/h','ok');}
    }
  }
  // try parse V2
  if(b[0]===0x5A&&b[1]===0xA5&&b.length>=8){
    const cmd=b[5];
    log('V2 cmd='+cmd.toString(16),'info');
    if(cmd===0x62&&b.length>=16){
      const spd=Math.round((b[8]|(b[9]<<8))/1000*3.6);
      const bat=b[16]||0;
      document.getElementById('s-speed').textContent=spd;
      document.getElementById('s-batt').textContent=bat;
    }
  }
}

async function probeAll(){
  log('Sende alle bekannten Status-Anfragen...','warn');
  // V1 variants
  const v1cmds=[[0x61,[0x20,0x00,0x20,0x00]],[0x61,[0x00,0x00,0x20,0x00]],[0x64,[0x02,0x00]],[0x62,[]]];
  for(const [c,p] of v1cmds){
    if(!conn)return;
    const pkt=pktV1(c,p);
    log('TX: '+hx(pkt));
    await write(pkt);
    await delay(400);
  }
  // V2 ESC variants
  const v2cmds=[[0x01,0x62,[]],[0x01,0x64,[]],[0x01,0x61,[0x20,0x00]]];
  for(const [arg,c,p] of v2cmds){
    if(!conn)return;
    const pkt=pktV2(0x20,c,arg,p);
    log('TX(V2): '+hx(pkt));
    await write(pkt);
    await delay(400);
  }
  log('Probe abgeschlossen. Prüfe RX oben.','info');
}

async function toggleConnect(){
  if(conn){doDisc();}else{await doConn();}
}

async function doConn(){
  const btn=document.getElementById('conn-btn');
  btn.textContent='Verbinde…';btn.className='connect-btn connecting';
  try{
    dev=await navigator.bluetooth.requestDevice({
      filters:[{namePrefix:'NineBot'},{namePrefix:'Ninebot'},{namePrefix:'E2'},{services:[SVC]}],
      optionalServices:[SVC]
    });
    dev.addEventListener('gattserverdisconnected',onDisc);
    const srv=await dev.gatt.connect();
    const svc=await srv.getPrimaryService(SVC);
    txC=await svc.getCharacteristic(TX);
    rxC=await svc.getCharacteristic(RX);
    await rxC.startNotifications();
    rxC.addEventListener('characteristicvaluechanged',parseRx);
    conn=true;
    log('Verbunden: '+dev.name,'ok');
    setUI(true,dev.name);
    await delay(500);
    if(proto===2){await probeAll();}
    else{
      // try reading status + limit
      await send(0x61,[0x20,0x00,0x20,0x00]);
      await delay(300);
      await send(0x64,[0x02,0x00]);
      // start polling
      pollTimer=setInterval(async()=>{
        if(conn)await send(0x61,[0x20,0x00,0x20,0x00]);
      },2500);
    }
  }catch(e){
    log('Fehler: '+e.message,'err');
    btn.textContent='Bluetooth verbinden';btn.className='connect-btn idle';
  }
}

function doDisc(){if(dev&&dev.gatt.connected)dev.gatt.disconnect();onDisc();}
function onDisc(){
  conn=false;txC=null;rxC=null;
  clearInterval(pollTimer);
  setUI(false);log('Getrennt','err');
}

function setUI(v,name){
  document.getElementById('conn-badge').textContent=v?'Verbunden':'Getrennt';
  document.getElementById('conn-badge').className='badge '+(v?'connected':'disconnected');
  document.getElementById('conn-btn').textContent=v?'Trennen':'Bluetooth verbinden';
  document.getElementById('conn-btn').className='connect-btn '+(v?'disc':'idle');
  document.getElementById('device-name').textContent=v?(name||'Verbunden'):'Nicht verbunden';
  if(!v){
    ['s-speed','s-batt','s-limit'].forEach(id=>document.getElementById(id).textContent='—');
    document.getElementById('batt-text').textContent='—';
    document.getElementById('batt-fill').style.width='0%';
  }
}

const ML={eco:15,drive:25,sport:32};
async function setMode(m){
  ['eco','drive','sport'].forEach(x=>document.getElementById('mode-'+x).classList.remove('active'));
  document.getElementById('mode-'+m).classList.add('active');
  setLimit(ML[m]);
  if(!conn)return;
  // try multiple mode command variants
  const mval={eco:0x00,drive:0x01,sport:0x02}[m];
  await send(0x65,[mval,0x00]);
  await delay(100);
  await send(0x67,[mval]);
  log('Modus: '+m,'ok');
}

function onSlider(v){document.getElementById('limit-display').textContent=v;updateQ(parseInt(v));}

async function sendSpeedLimit(v){
  v=parseInt(v);
  document.getElementById('s-limit').textContent=v;
  if(!conn)return;
  const mmps=Math.round(v*1000/3.6);
  const lo=mmps&0xFF,hi=(mmps>>8)&0xFF;
  // try both V1 write and V2 write
  await send(0x64,[0x02,0x00,lo,hi]);
  await delay(100);
  if(proto===1) await sendV2BLE(0x64,[0x02,0x00,lo,hi]);
  log('Limit: '+v+' km/h gesendet','ok');
}

function setLimit(v){
  v=parseInt(v);
  document.getElementById('speed-slider').value=v;
  setLimitDisplay(v);
  sendSpeedLimit(v);
}
function setLimitDisplay(v){
  document.getElementById('limit-display').textContent=v;
  document.getElementById('s-limit').textContent=v;
  updateQ(v);
}
function updateQ(v){document.querySelectorAll('.qbtn').forEach(b=>b.classList.toggle('active',parseInt(b.textContent)===v));}

const BK={left_on:[0x01,0x00],left_off:[0x00,0x00],right_on:[0x02,0x00],right_off:[0x00,0x00],warn_on:[0x03,0x00],warn_off:[0x00,0x00]};
async function sendBlink(key){
  if(!conn){log('Blinker offline: '+key);return;}
  await send(0x6C,BK[key]);
  // also try alternate register
  await delay(80);
  await send(0x3B,BK[key]);
  log('Blinker: '+key,'ok');
}

function toggleBlinker(side){
  const was=bst[side];
  bst={left:false,right:false,warn:false};
  ['bln-left','bln-right','bln-warn'].forEach(id=>document.getElementById(id).className=document.getElementById(id).className.replace(/ a[lrw]/g,'').replace('al','').replace('ar','').replace('aw',''));
  document.getElementById('bln-left').classList.remove('al','ar','aw');
  document.getElementById('bln-right').classList.remove('al','ar','aw');
  document.getElementById('bln-warn').classList.remove('al','ar','aw');
  if(!was){
    bst[side]=true;
    if(side==='left'){document.getElementById('bln-left').classList.add('al');sendBlink('left_on');}
    else if(side==='right'){document.getElementById('bln-right').classList.add('ar');sendBlink('right_on');}
    else{['bln-left','bln-right','bln-warn'].forEach(id=>document.getElementById(id).classList.add('aw'));sendBlink('warn_on');}
  }else sendBlink(side==='warn'?'warn_off':side+'_off');
}
</script>
</body>
</html>
